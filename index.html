<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="profile-card">
        <div class="profile-image-container">
            <img src="https://i.pravatar.cc/150?u=a042581f4e29026704d" alt="Profile Image Placeholder" class="profile-image">
        </div>
        <header class="profile-header">
            <h1 class="profile-name">Alex Doe</h1>
        </header>
        <div class="profile-stream">Computer Science</div>
        <p class="profile-bio">
            A passionate learner and tech enthusiast, currently exploring the world of artificial intelligence and web development.
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
